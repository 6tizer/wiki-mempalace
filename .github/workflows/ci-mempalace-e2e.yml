name: CI Mempalace E2E

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'crates/wiki-core/**'
      - 'crates/wiki-kernel/**'
      - 'crates/wiki-storage/**'
      - 'crates/wiki-cli/**'
      - 'crates/wiki-mempalace-bridge/**'
      - 'crates/rust-mempalace/**'
      - 'scripts/e2e.sh'
      - '.github/workflows/ci-mempalace-*.yml'
  schedule:
    - cron: "0 2 * * *"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Full test suite (rust-mempalace only)
        run: cargo test -p rust-mempalace
