name: CI Quick

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quick:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Workspace format check
        run: cargo fmt --all -- --check

      - name: Workspace tests
        run: cargo test --workspace

      - name: Shell script syntax check
        run: |
          bash -n scripts/backup.sh
          bash -n scripts/e2e.sh
          bash -n scripts/recovery-drill.sh

      - name: Automation CLI smoke
        run: |
          tmpdir="$(mktemp -d)"
          db="$tmpdir/wiki.db"
          cargo run -q -p wiki-cli -- --db "$db" automation run-daily --dry-run
          cargo run -q -p wiki-cli -- --db "$db" automation status
          cargo run -q -p wiki-cli -- --db "$db" automation doctor
