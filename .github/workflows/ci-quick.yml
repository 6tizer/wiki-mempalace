name: CI Quick

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quick:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Workspace format check
        run: cargo fmt --all -- --check

      - name: Workspace tests
        run: cargo test --workspace

      - name: Shell script syntax check
        run: |
          bash -n scripts/backup.sh
          bash -n scripts/e2e.sh
          bash -n scripts/recovery-drill.sh

      - name: Automation CLI smoke
        run: |
          tmpdir="$(mktemp -d)"
          db="$tmpdir/wiki.db"
          wiki_dir="$tmpdir/wiki"
          mkdir -p "$wiki_dir/pages/concept" "$wiki_dir/sources/raw"
          cat > "$wiki_dir/index.md" <<'EOF'
          # Index
          EOF
          cat > "$wiki_dir/log.md" <<'EOF'
          # Log
          EOF
          cat > "$wiki_dir/pages/concept/example.md" <<'EOF'
          ---
          id: page-1
          title: Example
          status: Draft
          ---

          body
          EOF
          cat > "$wiki_dir/sources/raw/example.txt" <<'EOF'
          source body
          EOF
          cargo run -q -p wiki-cli -- --db "$db" automation run-daily --dry-run
          cargo run -q -p wiki-cli -- --db "$db" automation status
          cargo run -q -p wiki-cli -- --db "$db" automation doctor
          cargo run -q -p wiki-cli -- --db "$db" --wiki-dir "$wiki_dir" automation verify-restore
